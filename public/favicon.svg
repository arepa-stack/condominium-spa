<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="aptoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FD6C00"/>
      <stop offset="100%" stop-color="#FF8A2B"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background with brand gradient -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#aptoBg)"/>

  <!-- Subtle inner ring (mirrors ring-1 ring-white/20 in the component) -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" ry="13.5" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Apartment / building icon (white) -->
  <g fill="#ffffff" transform="translate(13 14)">
    <!-- Left tower -->
    <rect x="0" y="8" width="16" height="28" rx="1.5"/>
    <!-- Right tower (taller) -->
    <rect x="18" y="0" width="20" height="36" rx="1.5"/>

    <!-- Windows: left tower (2 cols x 3 rows) -->
    <g fill="#FD6C00">
      <rect x="2.5"  y="11" width="4" height="4" rx="0.6"/>
      <rect x="9.5"  y="11" width="4" height="4" rx="0.6"/>
      <rect x="2.5"  y="19" width="4" height="4" rx="0.6"/>
      <rect x="9.5"  y="19" width="4" height="4" rx="0.6"/>
      <rect x="2.5"  y="27" width="4" height="4" rx="0.6"/>
      <rect x="9.5"  y="27" width="4" height="4" rx="0.6"/>

      <!-- Windows: right tower (3 cols x 4 rows) -->
      <rect x="20.5" y="4"  width="4" height="4" rx="0.6"/>
      <rect x="27"   y="4"  width="4" height="4" rx="0.6"/>
      <rect x="33.5" y="4"  width="4" height="4" rx="0.6"/>

      <rect x="20.5" y="12" width="4" height="4" rx="0.6"/>
      <rect x="27"   y="12" width="4" height="4" rx="0.6"/>
      <rect x="33.5" y="12" width="4" height="4" rx="0.6"/>

      <rect x="20.5" y="20" width="4" height="4" rx="0.6"/>
      <rect x="27"   y="20" width="4" height="4" rx="0.6"/>
      <rect x="33.5" y="20" width="4" height="4" rx="0.6"/>

      <rect x="20.5" y="28" width="4" height="4" rx="0.6"/>
      <rect x="33.5" y="28" width="4" height="4" rx="0.6"/>

      <!-- Door (right tower, center bottom) -->
      <rect x="27" y="28" width="4" height="8" rx="0.6"/>
    </g>
  </g>
</svg>
